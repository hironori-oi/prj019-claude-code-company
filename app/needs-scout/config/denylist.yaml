# needs-scout critical-domain denylist v1 — Round 12 Dev-A YAML 直書き化 (CB-D-W3-01 完遂)
#
# 設計:
#   - 13 領域 × 4 tier (baseline / critical / major / minor / backlog) で keyword を分類。
#     ※ baseline = Round 9 着地分 (DEC-019-010 確定時 13 領域基本セット)
#     ※ critical / major / minor = Round 10/11 拡張分 (review-round9 §3.2/§3.3 分類)
#     ※ backlog = 将来候補 (Round 11 minor 16 件の audit lineage、enabled: false で runtime 除外)
#   - 各 tier には enabled: true|false フラグを持ち、loader 側で enabled === true のみ runtime denylist に load。
#   - keywords は lowercase 部分一致用 (大小文字混在 / 全角混在は normalization.ts NFKC layer が吸収)。
#
# 連動:
#   - DEC-019-010 (重要 13 領域 fail-safe denylist)
#   - CB-D-W3-01 (needs_scout skill config 直接埋込)
#   - Round 10 dev-α: critical 7 + major 26 着地
#   - Round 11 Dev-A: minor 14 着地 + 既存確認 2 件 = 16 件完遂
#   - Round 12 Dev-A: NFKC + YAML 化 + backlog tier の audit 化 (本 file)
#
# 運用ルール (Round 13 引継):
#   - keyword 追加は PR ベース、Review 部門 1 名 + Dev 部門 1 名の approval 必須
#   - tier 移動 (backlog → minor 等) は DEC log への記録必須
#   - Object.freeze 完全準拠 (loader 側で freeze、本 file は YAML データのみ)

