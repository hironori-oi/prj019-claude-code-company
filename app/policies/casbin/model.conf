# =============================================================================
# PRJ-019 Clawbridge - Casbin Model
# DEC-019-033 §⑤ priviledge escalation 4 層防御 / 7 categories
#
# RBAC + restrictive deny envelope + ABAC-ish category matching.
#  - subject: role (owner / operator / open_claw_restricted / system)
#  - object:  resource string "category:resource_path"
#  - action:  read / write / exec / approve / deny
#  - effect:  prefer deny (deny envelope) over allow
# =============================================================================

[request_definition]
r = sub, obj, act

[policy_definition]
p = sub, obj, act, eft

[role_definition]
g = _, _

[policy_effect]
# deny-overrides: 1 件でも deny マッチがあれば deny
e = !some(where (p.eft == deny)) && some(where (p.eft == allow))

[matchers]
m = g(r.sub, p.sub) \
  && keyMatch4(r.obj, p.obj) \
  && (p.act == r.act || p.act == "*")
